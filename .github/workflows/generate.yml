name: Generate Kids Math Activity Book

on:
  workflow_dispatch:
    inputs:
      age_group:
        description: "Age group"
        required: true
        default: "5-8"
        type: choice
        options:
          - "5-6"
          - "6-7"
          - "7-8"
          - "5-8"

      pages:
        description: "Number of worksheet pages"
        required: true
        default: "80"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Generate Kids Math Book
        run: python generate_book.py
        env:
          AGE_GROUP: ${{ github.event.inputs.age_group }}
          PAGES: ${{ github.event.inputs.pages }}

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: kids-math-activity-book
          path: output/
